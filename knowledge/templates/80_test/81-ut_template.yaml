# ============================================================
# Unit Test Document Template
# Version: 1.0
# Framework: IEEE 29119 / General Best Practice
# Granularity: Per single testable unit (function/method)
# ============================================================

metadata:
  document_id: "UT-[NNNN]"               # e.g., UT-0001
  title: ""                               # e.g., "Unit Tests for calculateDiscount()"
  version: ""                             # Semantic: Major.Minor (e.g., 1.0)
  status: ""                              # Draft | In Review | Approved | Superseded | Retired
  classification: ""                      # Public | Internal | Confidential | Restricted
  created_date: ""                        # YYYY-MM-DD
  last_updated: ""                        # YYYY-MM-DD
  author: ""                              # Person who authored the test document
  reviewer: ""                            # Person who reviewed the test document
  approver: ""                            # Person who approved the test document
  related_documents: []                   # List of related doc IDs (e.g., FRD-0001, PSD-0001)

# ------------------------------------------------------------
# Section 1: Unit Under Test
# ------------------------------------------------------------
unit_under_test:
  description: >
    Identify the exact function or method being tested.
    Include the module/class it belongs to, its signature,
    and a brief description of its responsibility.
  required: true
  function_name: ""                       # e.g., calculateDiscount
  module_or_class: ""                     # e.g., pricing.DiscountEngine
  function_signature: ""                  # e.g., calculateDiscount(price: float, customerTier: str) -> float
  purpose: ""                             # One-sentence description of what the function does
  source_file: ""                         # e.g., src/pricing/discount_engine.py
  source_version: ""                      # Git commit hash or branch reference

# ------------------------------------------------------------
# Section 2: Dependencies & Test Environment
# ------------------------------------------------------------
dependencies_and_environment:
  description: >
    List all dependencies the unit relies on and how they
    will be handled (mocked, stubbed, or used as-is).
    Define the test environment configuration.
  required: true
  dependencies:
    - name: ""                            # e.g., DatabaseRepository
      type: ""                            # Direct | Indirect
      handling: ""                        # Mocked | Stubbed | Faked | Real
      justification: ""                   # Why this handling approach was chosen
  test_framework: ""                      # e.g., pytest, JUnit, Jest, xUnit
  test_environment:
    runtime: ""                           # e.g., Python 3.11, JDK 17, Node 20
    os: ""                                # e.g., Linux, Windows, macOS, Any
    special_configuration: ""             # e.g., env vars, feature flags, config overrides

# ------------------------------------------------------------
# Section 3: Preconditions
# ------------------------------------------------------------
preconditions:
  description: >
    Define the state that must be true before any test case
    in this document can execute. This includes data setup,
    system state, and any assumptions.
  required: true
  items:
    - precondition: ""                    # e.g., "Customer tier lookup table is populated"
      setup_method: ""                    # e.g., "Mocked via fixture"

# ------------------------------------------------------------
# Section 4: Test Cases
# ------------------------------------------------------------
test_cases:
  description: >
    Define individual test cases for the unit under test.
    Each test case should cover one specific behavior or
    scenario. Follow the Arrange-Act-Assert pattern.
    Cover: happy path, edge cases, boundary values,
    error handling, and negative scenarios.
  required: true
  cases:
    - test_case_id: ""                    # e.g., UT-0001-TC01
      title: ""                           # Short descriptive name
      category: ""                        # Happy Path | Edge Case | Boundary | Negative | Error Handling
      priority: ""                        # Critical | High | Medium | Low
      description: ""                     # What specific behavior is being verified
      linked_requirement: ""              # Traceability to requirement ID (e.g., FRD-0012-REQ-03)
      arrange:
        description: >
          Set up the test data, mocks, and initial state.
        test_data:
          inputs: []                      # List of input values with descriptions
          mocks: []                       # Mock configurations
          initial_state: ""               # Description of starting state
      act:
        description: >
          The specific function call or action being tested.
        invocation: ""                    # e.g., result = calculateDiscount(100.0, "gold")
      assert:
        description: >
          The expected outcome and how it is verified.
        expected_result: ""               # e.g., 85.0
        assertion_type: ""                # Equality | Inequality | Exception | State Change | Side Effect
        tolerance: ""                     # For floating-point or approximate assertions (optional)
      postconditions: ""                  # Any state that should be true after the test (optional)
      notes: ""                           # Additional context or clarification (optional)

# ------------------------------------------------------------
# Section 5: Coverage Requirements
# ------------------------------------------------------------
coverage_requirements:
  description: >
    Define the expected test coverage metrics for the
    unit under test. Specify targets and measurement method.
  required: true
  line_coverage_target: ""                # e.g., 90%
  branch_coverage_target: ""             # e.g., 85%
  mutation_score_target: ""              # e.g., 80% (optional, for mutation testing)
  coverage_tool: ""                       # e.g., coverage.py, JaCoCo, Istanbul
  excluded_lines: []                      # Lines excluded from coverage with justification

# ------------------------------------------------------------
# Section 6: Execution Results
# ------------------------------------------------------------
execution_results:
  description: >
    Record the results of test execution. This section is
    filled in after test runs. Include pass/fail status,
    execution time, and any defects discovered.
  required: false
  last_execution_date: ""                 # YYYY-MM-DD
  executed_by: ""                         # Person or CI/CD pipeline
  environment: ""                         # Where tests were run (local, CI, staging)
  summary:
    total_cases: 0
    passed: 0
    failed: 0
    skipped: 0
    blocked: 0
    execution_time: ""                    # e.g., 1.2s
  failures:
    - test_case_id: ""
      actual_result: ""
      defect_id: ""                       # Link to defect tracker
      root_cause: ""
  coverage_achieved:
    line_coverage: ""
    branch_coverage: ""

# ------------------------------------------------------------
# Section 7: Risks & Assumptions
# ------------------------------------------------------------

risks_and_assumptions:
  description: >
    Document any risks to test validity and assumptions
    made during test design. Flag areas where testing
    may be insufficient.
  required: false
  risks:
    - risk: ""                            # e.g., "Mocked DB may not reflect production behavior"
      mitigation: ""                      # e.g., "Integration tests cover real DB interaction"
  assumptions:
    - assumption: ""                      # e.g., "Input validation is handled by the caller"

# ------------------------------------------------------------
# Section 8: Attachments
# ------------------------------------------------------------
attachments:
  description: >
    Supporting files such as test data files, mock
    configuration files, or coverage reports.
  required: false
  files:
    - filename: ""
      description: ""
      location: ""                        # File path or URL

# ------------------------------------------------------------
# Section 9: Change Log
# ------------------------------------------------------------
change_log:
  description: >
    Track all changes to this document over time.
  required: true
  entries:
    - version: ""
      date: ""
      author: ""
      changes: ""
